server:
  port: ${SERVER_PORT:18080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/build_guard?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:buildguard}
    password: ${MYSQL_PASSWORD:buildguard}
  mongodb:
    uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/build_guard}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
  rabbitmq:
    host: ${RABBITMQ_HOST:110.41.166.11}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtps}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

buildguard:
  public-base-url: ${BUILDGUARD_PUBLIC_BASE_URL:http://110.41.166.11:18080}
  ai:
    base-url: ${BUILDGUARD_AI_BASE_URL:http://127.0.0.1:19090}
  sim:
    enabled: ${BUILDGUARD_SIM_ENABLED:true}
    base-url: ${BUILDGUARD_SIM_BASE_URL:http://127.0.0.1:19099}
    poll-interval-ms: ${BUILDGUARD_SIM_POLL_INTERVAL_MS:3000}
  storage:
    local-root: ${BUILDGUARD_STORAGE_LOCAL_ROOT:data/uploads}
    public-base-url: ${BUILDGUARD_STORAGE_PUBLIC_BASE_URL:http://127.0.0.1:18080}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucketName: ${ALIYUN_OSS_BUCKET:buildguard-dev}

payment:
  alipay:
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
    format: ${ALIPAY_FORMAT:json}
    charset: ${ALIPAY_CHARSET:UTF-8}
    sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    notify-url: ${ALIPAY_NOTIFY_URL:http://110.41.166.11:18080/api/payments/alipay/notify}
